server.port=8080

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTTokenGeneration1234567890!@#$%^&*()_+}
jwt.expiration=${JWT_EXPIRATION:86400000}

logging.level.org.springframework.security=DEBUG
logging.level.com.premiao.crm=DEBUG
