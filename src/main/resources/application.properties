# ==========================================
# CONFIGURAÇÃO DO BANCO DE DADOS
# ==========================================

# Detecta automaticamente: PostgreSQL se tiver DATABASE_URL, senão H2
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}

# Driver: PostgreSQL se a URL contiver 'postgresql', senão H2
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}

# Credenciais (usadas apenas se for H2)
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ==========================================
# CONFIGURAÇÃO DO HIBERNATE/JPA
# ==========================================

# Cria/atualiza tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra SQLs no log (útil para debug)
spring.jpa.show-sql=true

# Dialeto: deixa o Hibernate detectar automaticamente
# (remove configuração fixa para evitar conflito)

# ==========================================
# H2 CONSOLE (apenas desenvolvimento local)
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# CONFIGURAÇÃO ESPECÍFICA PARA POSTGRESQL
# ==========================================
# Quando usar PostgreSQL, ajusta configurações específicas
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
