# ==========================================
# CONFIGURAÇÃO DO BANCO DE DADOS
# ==========================================

# URL do banco (o Render injeta automaticamente via DATABASE_URL)
# Se não tiver DATABASE_URL, usa H2 em memória
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ==========================================
# CONFIGURAÇÃO DO HIBERNATE/JPA
# ==========================================

# Cria/atualiza as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra os SQLs no console (útil para debug)
spring.jpa.show-sql=true

# Dialeto do banco (auto-detecta)
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ==========================================
# H2 CONSOLE (apenas para desenvolvimento)
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
